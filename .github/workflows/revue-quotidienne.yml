name: revue-quotidienne
on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.JUBEL_BOT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Générer la revue du jour
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: npx tsx scripts/revue/run.ts

      - name: Commit et push
        run: |
          git config user.name "jubel-bot"
          git config user.email "bot@jubel.sn"
          git add content/revue-du-jour
          git diff --staged --quiet && echo "Pas de changement" || (git commit -m "revue: $(date +%Y-%m-%d)" && git push origin main)
